<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>UTS Alhendes</title>
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-lg">
            <div
              class="card-header text-center"
              style="background-color: #09637e; color: white"
            >
              Kalkulator Bangun Datar
            </div>
            <div class="card-body">
              <div class="mb-3">
                <label>Pilih Bangun Datar</label>
                <div>
                  <div class="col-md-6 mb-3">
                    <input type="checkbox" name="" id="persegiPanjang" />
                    <label>Persegi Panjang</label>
                  </div>
                  <div class="col-md-6 mb-3">
                    <input type="checkbox" name="" id="segitiga" />
                    <label>Segitiga</label>
                  </div>
                </div>

                <hr />
                <div class="mb-3">
                  <label>Panjang / Alas</label>
                  <input type="number" id="angkaPertama" class="form-control" />
                </div>
                <div class="mb-3">
                  <label>Lebar / Tinggi</label>
                  <input type="number" id="angkaKedua" class="form-control" />
                </div>
              </div>
              <button
                onclick="hitung()"
                class="btn w-100"
                style="background-color: #497979; color: white"
              >
                Hitung
              </button>
              <hr />
              <h5>Hasil</h5>
              <p>Luas : <span id="hasil">-</span></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function hitung() {
        const segitiga = document.getElementById("segitiga");
        const persegiPanjang = document.getElementById("persegiPanjang");
        const n1 = parseFloat(document.getElementById("angkaPertama").value);
        const n2 = parseFloat(document.getElementById("angkaKedua").value);

        if (isNaN(n1) || isNaN(n2)) {
          alert("Mohon Isi Semua Kolom!!");
          return;
        }

        if (persegiPanjang) {
          const hasilPersegi = n1 * n2;
          document.getElementById("hasil").innerText = hasilPersegi;
        } else if (segitiga) {
          const hasilSegitiga = 0.5 * n1 * n2;
          document.getElementById("hasil").innerText = hasilSegitiga;} 
        else {
          alert("Mohon Pilih Bangun Datar");
        }

        
       
      }
    </script>
  </body>
</html>
